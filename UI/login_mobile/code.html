<body class="bg-obsidian-base text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-mobile relative overflow-hidden">
<!-- Ambient Background Effect -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 0%, #A855F7 0%, transparent 60%);"></div>
<div class="w-full max-w-sm z-10">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(0,245,255,0.3)]">
<span class="material-symbols-outlined text-obsidian-base" data-icon="hub">hub</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary-container">The Knower OS</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2 text-center">Secure Authentication Required</p>
</div>
<!-- Login Card -->
<div class="bg-obsidian-surface border border-obsidian-elevated rounded-xl p-6 shadow-lg shadow-black/50 backdrop-blur-md">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 uppercase tracking-wider" for="email">Operator ID</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="badge">badge</span>
</div>
<input class="block w-full pl-10 bg-obsidian-base border border-obsidian-elevated rounded-lg py-3 text-on-surface font-body-md focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors shadow-inner" id="email" name="email" placeholder="operator@obsidian.sys" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Access Key</label>
<a class="font-label-sm text-label-sm text-primary-container hover:text-primary transition-colors" href="#">Recover</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="key">key</span>
</div>
<input class="block w-full pl-10 pr-10 bg-obsidian-base border border-obsidian-elevated rounded-lg py-3 text-on-surface font-body-md focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors shadow-inner" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline-variant hover:text-on-surface-variant transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Biometric/MFA hint -->
<div class="flex items-center justify-center p-3 bg-obsidian-elevated/30 border border-obsidian-elevated rounded-lg">
<span class="material-symbols-outlined text-ai-purple mr-2" data-icon="fingerprint">fingerprint</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Biometric Auth Ready</span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-body-md font-semibold py-3 px-4 rounded-lg hover:bg-primary transition-all active:scale-95 shadow-[0_0_15px_rgba(0,245,255,0.2)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-obsidian-base focus:ring-primary-container flex justify-center items-center" type="submit">
                    Initiate Sequence
                    <span class="material-symbols-outlined ml-2 text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-50">
                © 2024 Obsidian Intelligence Systems
            </p>
</div>
